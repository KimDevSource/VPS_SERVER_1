<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimVPS | Real-time Status</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-orange: #ffaa00;
            --neon-red: #ff4444;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #001a33 0%, #050505 80%);
        }

        .brand-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin: 0;
            text-transform: uppercase;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.2rem;
            color: var(--neon-blue);
            letter-spacing: 2px;
            font-family: monospace;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-blue);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-overlay {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 50px;
            font-family: monospace;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .stat-item { text-align: center; }
        .stat-label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 5px; }
        .stat-value { color: var(--neon-blue); font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="brand-name">KimVPS</h1>
        <div class="status-container" id="status-box">
            <div class="pulse-dot" id="dot"></div>
            <span id="status-text">INITIALIZING...</span>
        </div>
    </div>

    <div class="stats-overlay">
        <div class="stat-item">
            <span class="stat-label">CPU USAGE</span>
            <span class="stat-value" id="cpu">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">MEMORY</span>
            <span class="stat-value" id="ram">0.0 GB</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">NETWORK</span>
            <span class="stat-value" id="net">0.0 KB/s</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">UPTIME</span>
            <span class="stat-value" id="uptime">0H 0M 0S</span>
        </div>
    </div>

    <script>
        // ข้อมูลใหม่ของคุณ
        const OWNER = 'kimdev-source';
        const REPO = 'Vps';

        const cpuEl = document.getElementById('cpu');
        const ramEl = document.getElementById('ram');
        const netEl = document.getElementById('net');
        const uptimeEl = document.getElementById('uptime');
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('dot');

        async function updateDashboard() {
            try {
                // ดึงข้อมูลผ่าน Public API (ไม่ต้องใช้ Token)
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=1`);
                const data = await res.json();
                const run = data.workflow_runs[0];

                if (!run) {
                    statusText.innerText = "NO ACTIONS FOUND";
                    return;
                }

                // ตรวจสอบสถานะการรัน
                const isRunning = run.status === "in_progress" || run.status === "queued";
                const isSuccess = run.conclusion === "success";

                if (isRunning) {
                    setTheme("DEPLOYING...", "var(--neon-orange)");
                    animateValues(true);
                } else if (isSuccess) {
                    setTheme("SYSTEM ONLINE", "var(--neon-blue)");
                    animateValues(false);
                } else {
                    setTheme("ACTION FAILED", "var(--neon-red)");
                    animateValues(false);
                }

                // คำนวณ Uptime จริงจากจุดเริ่มต้นของ Run ล่าสุด
                const startTime = new Date(run.created_at);
                const now = new Date();
                const diff = Math.floor((now - startTime) / 1000);
                const h = Math.floor(diff / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;
                uptimeEl.innerText = `${h}H ${m}M ${s}S`;

            } catch (err) {
                statusText.innerText = "OFFLINE";
            }
        }

        function setTheme(text, color) {
            statusText.innerText = text;
            statusText.style.color = color;
            dot.style.backgroundColor = color;
            dot.style.boxShadow = `0 0 15px ${color}`;
        }

        function animateValues(isBusy) {
            // จำลองตัวเลขให้ขยับตามสถานะจริง
            const cpu = isBusy ? Math.floor(Math.random() * 25) + 65 : Math.floor(Math.random() * 10) + 2;
            const ram = isBusy ? (Math.random() * (4.2 - 3.0) + 3.0).toFixed(1) : (Math.random() * (1.1 - 0.7) + 0.7).toFixed(1);
            const net = isBusy ? (Math.random() * 2500).toFixed(1) : (Math.random() * 15).toFixed(1);

            cpuEl.innerText = `${cpu}%`;
            ramEl.innerText = `${ram} GB`;
            netEl.innerText = `${net} KB/s`;
        }

        // อัปเดตสถานะจาก GitHub ทุก 20 วินาที
        setInterval(updateDashboard, 20000);
        // ให้ตัวเลขขยับหลอกๆ ทุก 2 วินาที (ใช้สถานะล่าสุดมาอ้างอิง)
        setInterval(() => {
            const isBusy = statusText.innerText.includes("DEPLOYING");
            animateValues(isBusy);
        }, 2000);

        updateDashboard();
    </script>
</body>
</html>
